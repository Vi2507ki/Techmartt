<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout — TechMart</title>
  <link rel="stylesheet" href="css/main.css" />
  <style>
    .checkout-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 24px;
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 20px;
    }

    @media(max-width:768px) { .checkout-layout { grid-template-columns: 1fr; } }

    .checkout-card {
      background: white;
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 16px;
    }

    .checkout-card h3 {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--gray-100);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .address-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .address-grid .full { grid-column: 1 / -1; }

    .payment-methods { display: grid; gap: 10px; }
    .pay-method {
      border: 2px solid var(--gray-200);
      border-radius: 8px;
      padding: 14px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: var(--transition);
    }
    .pay-method:hover { border-color: var(--primary); background: #f0f4ff; }
    .pay-method.selected { border-color: var(--primary); background: #e8f0fe; }
    .pay-method .method-icon { font-size: 24px; }
    .pay-method .method-info h4 { font-size: 14px; font-weight: 600; }
    .pay-method .method-info p { font-size: 12px; color: var(--gray-500); }
    .pay-method input[type=radio] { margin-left: auto; accent-color: var(--primary); }

    /* Stripe Card Element */
    #stripe-card-element {
      border: 1.5px solid var(--gray-300);
      border-radius: 6px;
      padding: 12px 14px;
      margin-top: 12px;
      background: white;
      min-height: 44px;
    }

    #stripe-card-element.StripeElement--focus { border-color: var(--primary); }
    #card-errors { color: var(--danger); font-size: 13px; margin-top: 6px; }

    /* Simulated card form (no Stripe) */
    .card-form { margin-top: 12px; display: none; }
    .card-form.show { display: block; }

    /* Order Summary */
    .order-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--gray-100);
      gap: 12px;
    }
    .order-item img { width: 50px; height: 50px; object-fit: contain; border-radius: 4px; background: #f5f5f5; }
    .order-item-info { flex: 1; }
    .order-item-name { font-size: 13px; font-weight: 600; }
    .order-item-meta { font-size: 12px; color: var(--gray-500); }

    .price-breakdown { margin-top: 16px; }
    .price-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 14px;
      color: var(--gray-700);
    }
    .price-row.total {
      font-size: 16px;
      font-weight: 700;
      color: var(--gray-900);
      border-top: 2px solid var(--gray-200);
      margin-top: 8px;
      padding-top: 12px;
    }
    .price-row.savings { color: var(--success); }

    .place-order-btn {
      width: 100%;
      background: var(--secondary);
      color: white;
      border: none;
      padding: 16px;
      font-size: 17px;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--font-body);
      margin-top: 16px;
      transition: var(--transition);
    }
    .place-order-btn:hover { background: #e55a14; }
    .place-order-btn:disabled { background: var(--gray-300); cursor: not-allowed; }

    .safe-checkout { text-align: center; margin-top: 10px; font-size: 12px; color: var(--gray-500); }

    /* Success State */
    .order-success {
      text-align: center;
      padding: 48px 24px;
      max-width: 500px;
      margin: 40px auto;
      background: white;
      border-radius: 12px;
      box-shadow: var(--shadow-lg);
    }
    .success-icon { font-size: 64px; margin-bottom: 16px; }
    .order-success h2 { font-family: var(--font-display); font-size: 28px; font-weight: 800; color: var(--success); }
    .order-success p { color: var(--gray-500); margin: 10px 0 24px; font-size: 15px; }
    .order-id-badge { background: #e8f5e9; color: var(--success); padding: 8px 20px; border-radius: 20px; font-weight: 700; font-size: 16px; display: inline-block; margin-bottom: 24px; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="navbar-brand" onclick="window.location.href='index.html'" style="cursor:pointer">Tech<span>Mart</span></div>
  <div style="flex:1;text-align:center;color:white;font-size:14px;font-weight:600;">🔒 Secure Checkout</div>
  <button class="nav-btn" onclick="window.location.href='index.html'">← Continue Shopping</button>
</nav>

<!-- Main -->
<div id="checkout-main">
  <div class="checkout-layout">
    <!-- Left: Address + Payment -->
    <div>
      <!-- Delivery Address -->
      <div class="checkout-card">
        <h3>📍 Delivery Address</h3>
        <div class="address-grid">
          <div class="form-group">
            <label class="form-label">Full Name *</label>
            <input class="form-input" id="addr-name" placeholder="Enter full name" />
          </div>
          <div class="form-group">
            <label class="form-label">Phone Number *</label>
            <input class="form-input" id="addr-phone" type="tel" placeholder="10-digit number" />
          </div>
          <div class="form-group full">
            <label class="form-label">Street Address *</label>
            <input class="form-input" id="addr-street" placeholder="House no., Street, Locality" />
          </div>
          <div class="form-group">
            <label class="form-label">City *</label>
            <input class="form-input" id="addr-city" placeholder="City" />
          </div>
          <div class="form-group">
            <label class="form-label">State *</label>
            <input class="form-input" id="addr-state" placeholder="State" />
          </div>
          <div class="form-group">
            <label class="form-label">PIN Code *</label>
            <input class="form-input" id="addr-pin" placeholder="6-digit PIN" maxlength="6" />
          </div>
        </div>
      </div>

      <!-- Payment Method -->
      <div class="checkout-card">
        <h3>💳 Payment Method</h3>
        <div class="payment-methods">
          <label class="pay-method selected" data-method="card" onclick="selectPayment('card')">
            <span class="method-icon">💳</span>
            <div class="method-info">
              <h4>Credit / Debit Card</h4>
              <p>Visa, Mastercard, RuPay accepted</p>
            </div>
            <input type="radio" name="payment" value="card" checked />
          </label>
          <label class="pay-method" data-method="upi" onclick="selectPayment('upi')">
            <span class="method-icon">📲</span>
            <div class="method-info">
              <h4>UPI Payment</h4>
              <p>PhonePe, GPay, Paytm, BHIM</p>
            </div>
            <input type="radio" name="payment" value="upi" />
          </label>
          <label class="pay-method" data-method="netbanking" onclick="selectPayment('netbanking')">
            <span class="method-icon">🏦</span>
            <div class="method-info">
              <h4>Net Banking</h4>
              <p>All major banks supported</p>
            </div>
            <input type="radio" name="payment" value="netbanking" />
          </label>
          <label class="pay-method" data-method="cod" onclick="selectPayment('cod')">
            <span class="method-icon">💵</span>
            <div class="method-info">
              <h4>Cash on Delivery</h4>
              <p>Pay when delivered</p>
            </div>
            <input type="radio" name="payment" value="cod" />
          </label>
        </div>

        <!-- Card Form (simulated) -->
        <div class="card-form show" id="card-form">
          <div class="form-group" style="margin-top:16px;">
            <label class="form-label">Card Number</label>
            <input class="form-input" id="card-number" placeholder="1234 5678 9012 3456" maxlength="19" oninput="formatCard(this)" />
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="form-group">
              <label class="form-label">Expiry Date</label>
              <input class="form-input" id="card-expiry" placeholder="MM/YY" maxlength="5" oninput="formatExpiry(this)" />
            </div>
            <div class="form-group">
              <label class="form-label">CVV</label>
              <input class="form-input" id="card-cvv" placeholder="123" maxlength="3" type="password" />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Name on Card</label>
            <input class="form-input" id="card-name" placeholder="As on card" />
          </div>
        </div>

        <!-- UPI Form -->
        <div id="upi-form" style="display:none;margin-top:16px;">
          <div class="form-group">
            <label class="form-label">UPI ID</label>
            <input class="form-input" id="upi-id" placeholder="yourname@upi" />
          </div>
          <p style="font-size:12px;color:var(--gray-500);margin-top:8px;">A payment request will be sent to your UPI app</p>
        </div>
      </div>
    </div>

    <!-- Right: Order Summary -->
    <div>
      <div class="checkout-card" style="position:sticky;top:70px;">
        <h3>🛍️ Order Summary</h3>
        <div id="order-items"></div>
        <div class="price-breakdown" id="price-breakdown"></div>
        <button class="place-order-btn" id="place-order-btn" onclick="placeOrder()">
          Place Order →
        </button>
        <div class="safe-checkout">🔒 Secured by 256-bit SSL encryption</div>
      </div>
    </div>
  </div>
</div>

<!-- Success -->
<div id="success-view" style="display:none;">
  <div class="order-success">
    <div class="success-icon">🎉</div>
    <h2>Order Placed!</h2>
    <div class="order-id-badge" id="success-order-id"></div>
    <p>Thank you for shopping with TechMart! Your order will be delivered within 5 business days.</p>
    <button class="btn-primary" onclick="window.location.href='orders.html'" style="max-width:220px;margin:0 auto 12px;">Track My Order</button>
    <br/>
    <button onclick="window.location.href='index.html'" style="background:none;border:none;color:var(--primary);font-size:14px;cursor:pointer;font-weight:600;">Continue Shopping →</button>
  </div>
</div>

<script src="js/main.js"></script>
<script>
  let selectedPayment = 'card';

  function init() {
    if (!auth.isLoggedIn()) {
      showToast('Please login first', 'error');
      setTimeout(() => window.location.href = 'index.html', 1500);
      return;
    }
    if (!cart.items.length) {
      showToast('Cart is empty', 'error');
      setTimeout(() => window.location.href = 'index.html', 1500);
      return;
    }
    renderOrderSummary();

    // Pre-fill from user profile
    const user = api.getUser();
    if (user) {
      document.getElementById('addr-name').value = user.name || '';
    }
  }

  function renderOrderSummary() {
    const itemsEl = document.getElementById('order-items');
    itemsEl.innerHTML = cart.items.map(item => `
      <div class="order-item">
        <img src="${item.image || ''}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/50'" />
        <div class="order-item-info">
          <div class="order-item-name">${item.name.substring(0, 35)}...</div>
          <div class="order-item-meta">Qty: ${item.qty} × ${formatPrice(item.price)}</div>
        </div>
        <strong>${formatPrice(item.price * item.qty)}</strong>
      </div>
    `).join('');

    const itemsTotal = cart.total();
    const shipping = itemsTotal >= 999 ? 0 : 49;
    const total = itemsTotal + shipping;

    document.getElementById('price-breakdown').innerHTML = `
      <div class="price-row"><span>Items Total</span><span>${formatPrice(itemsTotal)}</span></div>
      <div class="price-row savings"><span>Savings</span><span>−${formatPrice(cart.items.reduce((s,i) => s + (i.originalPrice ? (i.originalPrice - i.price) * i.qty : 0), 0))}</span></div>
      <div class="price-row"><span>Delivery</span><span>${shipping === 0 ? '<span style="color:var(--success)">FREE</span>' : formatPrice(shipping)}</span></div>
      <div class="price-row total"><span>Total Amount</span><span>${formatPrice(total)}</span></div>
    `;
  }

  function selectPayment(method) {
    selectedPayment = method;
    document.querySelectorAll('.pay-method').forEach(el => el.classList.remove('selected'));
    document.querySelector(`[data-method="${method}"]`).classList.add('selected');
    document.querySelector(`[value="${method}"]`).checked = true;

    document.getElementById('card-form').style.display = method === 'card' ? 'block' : 'none';
    document.getElementById('upi-form').style.display = method === 'upi' ? 'block' : 'none';
  }

  function formatCard(input) {
    let v = input.value.replace(/\D/g, '').substring(0, 16);
    input.value = v.replace(/(.{4})/g, '$1 ').trim();
  }

  function formatExpiry(input) {
    let v = input.value.replace(/\D/g, '');
    if (v.length >= 2) v = v.substring(0, 2) + '/' + v.substring(2, 4);
    input.value = v;
  }

  async function placeOrder() {
    // Validate address
    const name = document.getElementById('addr-name').value.trim();
    const phone = document.getElementById('addr-phone').value.trim();
    const street = document.getElementById('addr-street').value.trim();
    const city = document.getElementById('addr-city').value.trim();
    const state = document.getElementById('addr-state').value.trim();
    const pincode = document.getElementById('addr-pin').value.trim();

    if (!name || !phone || !street || !city || !state || !pincode) {
      showToast('Please fill all address fields', 'error'); return;
    }
    if (phone.length !== 10) { showToast('Enter valid 10-digit phone number', 'error'); return; }
    if (pincode.length !== 6) { showToast('Enter valid 6-digit PIN code', 'error'); return; }

    // Validate payment
    if (selectedPayment === 'card') {
      const cardNum = document.getElementById('card-number').value.replace(/\s/g, '');
      const expiry = document.getElementById('card-expiry').value;
      const cvv = document.getElementById('card-cvv').value;
      if (cardNum.length < 16 || !expiry || cvv.length < 3) {
        showToast('Enter valid card details', 'error'); return;
      }
    }
    if (selectedPayment === 'upi') {
      const upiId = document.getElementById('upi-id').value.trim();
      if (!upiId.includes('@')) { showToast('Enter valid UPI ID', 'error'); return; }
    }

    const btn = document.getElementById('place-order-btn');
    btn.disabled = true;
    btn.textContent = '⏳ Processing...';

    try {
      // Simulate payment processing
      await new Promise(r => setTimeout(r, 1500));

      const orderData = {
        items: cart.items.map(i => ({ productId: i._id, quantity: i.qty })),
        shippingAddress: { name, phone, street, city, state, pincode, country: 'India' },
        paymentMethod: selectedPayment,
        paymentId: 'SIM_' + Date.now()
      };

      const result = await api.post('/orders', orderData, true);
      cart.clear();

      // Show success
      document.getElementById('checkout-main').style.display = 'none';
      document.getElementById('success-view').style.display = 'block';
      document.getElementById('success-order-id').textContent = result.order.orderId;
      showToast('Order placed successfully! 🎉', 'success');
    } catch(e) {
      showToast(e.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Place Order →';
    }
  }

  init();
</script>
</body>
</html>
